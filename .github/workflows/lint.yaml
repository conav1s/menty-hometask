name: Ruff Lint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: actions/checkout@v4

      - name: Python Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip

      - name: Install Ruff
        run: pip3 install ruff

      - name: Run Linter
        run: ruff check .
    
