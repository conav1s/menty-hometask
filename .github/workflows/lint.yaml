name: Ruff Lint

on: [push]

jobs:
  First-GitHub-Action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip

      - name: Install Ruff
        run: pip3 install ruff

      - name: Run Linter Check
        run: ruff check .

      - name: Run Linter Check Format
        run: ruff format --check
    
